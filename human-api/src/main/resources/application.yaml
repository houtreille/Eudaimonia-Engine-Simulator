server:
  port: 8666

spring:
  datasource:
    url: jdbc:postgresql://localhost:5436/eudaimonia_engine_db
    username: eudaimonia_user
    password: eudaimonia_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

