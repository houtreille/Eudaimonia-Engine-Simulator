management:
  tracing:
    enabled: true
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, prometheus, metrics, loggers, logfile
      cors:
        allowed-origins: '*'
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
