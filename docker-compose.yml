version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: eudaimonia-engine-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eudaimonia_engine_db}
      POSTGRES_USER: ${POSTGRES_USER:-eudaimonia_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eudaimonia_password}
    ports:
      - "${POSTGRES_PORT:-5436}:5432"
    volumes:
      - eudaimonia_postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init:/docker-entrypoint-initdb.d
    networks:
      - eudaimonia-stack
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eudaimonia_user} -d ${POSTGRES_DB:-eudaimonia_engine_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper (dependency for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: eudaimonia-engine-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_PORT:-2182}:2181"
    volumes:
      - eudaimonia_zookeeper_data:/var/lib/zookeeper/data
      - eudaimonia_zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - eudaimonia-stack
    restart: unless-stopped

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: eudaimonia-engine-kafka
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: eudaimonia-engine-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://eudaimonia-engine-kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_INTERNAL_PORT:-9092}:9092"
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    volumes:
      - eudaimonia_kafka_data:/var/lib/kafka/data
    networks:
      - eudaimonia-stack
    restart: unless-stopped

  # Kafka UI (optional but useful for debugging)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: eudaimonia-engine-kafka-ui
    ports:
      - "${KAFKA_UI_PORT:-8182}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: eudaimonia-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: eudaimonia-engine-kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: eudaimonia-engine-zookeeper:2181
    depends_on:
      - kafka
    networks:
      - eudaimonia-stack
    restart: unless-stopped

volumes:
  eudaimonia_postgres_data:
    driver: local
  eudaimonia_zookeeper_data:
    driver: local
  eudaimonia_zookeeper_logs:
    driver: local
  eudaimonia_kafka_data:
    driver: local

networks:
  eudaimonia-stack:
    driver: bridge
